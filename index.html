<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>הכנה למבחן מצטיינים — מתמטיקה</title>
<style>
  :root {
    --green:       #1D9E75;
    --green-light: #E1F5EE;
    --green-mid:   #9FE1CB;
    --green-dark:  #0F6E56;
    --green-deep:  #085041;
    --amber:       #EF9F27;
    --amber-light: #FAEEDA;
    --amber-mid:   #FAC775;
    --amber-dark:  #633806;
    --blue:        #378ADD;
    --blue-light:  #E6F1FB;
    --blue-dark:   #0C447C;
    --purple:      #7F77DD;
    --purple-light:#EEEDFE;
    --purple-dark: #3C3489;
    --gray-bg:     #F7F6F2;
    --gray-border: rgba(0,0,0,0.1);
    --gray-text:   #5F5E5A;
    --text:        #1a1a18;
    --radius:      10px;
    --radius-sm:   6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  /* ── HEADER ── */
  header {
    background: white;
    border-bottom: 0.5px solid var(--gray-border);
    padding: 1rem 1.25rem;
    text-align: center;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header p  { font-size: 13px; color: var(--gray-text); margin-top: 3px; }

  /* ── DAY TABS ── */
  .day-tabs {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 1rem 1rem 0;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0; padding: 7px 16px;
    border-radius: 999px; font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--gray-border);
    background: white; color: var(--gray-text);
    cursor: pointer; transition: all 0.15s;
  }
  .day-tab.active  { background: var(--green); border-color: var(--green); color: white; }
  .day-tab.done    { background: var(--green-light); border-color: var(--green-mid); color: var(--green-deep); }

  /* ── PROGRESS ── */
  .progress-wrap { padding: 10px 1rem 0; }
  .progress-track { background: var(--gray-border); border-radius: 999px; height: 5px; }
  .progress-fill  { background: var(--green); border-radius: 999px; height: 5px; transition: width 0.4s; }

  /* ── MAIN ── */
  main { padding: 1rem; max-width: 700px; margin: 0 auto; }

  /* ── DAY HEADER CARD ── */
  .day-header-card {
    background: white; border-radius: var(--radius);
    border: 0.5px solid var(--gray-border);
    padding: 1rem 1.25rem; margin-bottom: 1rem;
  }
  .day-header-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge-day {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    background: var(--green-light); color: var(--green-deep);
    border: 0.5px solid var(--green-mid); border-radius: 999px;
  }
  .day-title { font-size: 17px; font-weight: 600; }
  .day-meta  { font-size: 13px; color: var(--gray-text); margin-top: 4px; }
  .topics-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .topic-chip {
    font-size: 12px; padding: 3px 10px; border-radius: 999px;
    background: var(--gray-bg); border: 0.5px solid var(--gray-border);
    color: var(--gray-text);
  }
  .day-tip {
    margin-top: 12px; padding: 10px 12px;
    background: var(--amber-light); border: 0.5px solid var(--amber-mid);
    border-radius: var(--radius-sm); font-size: 13px; color: var(--amber-dark);
    line-height: 1.6;
  }

  /* ── EXERCISE CARD ── */
  .exercise-card {
    background: white; border-radius: var(--radius);
    border: 0.5px solid var(--gray-border);
    margin-bottom: 1rem; overflow: hidden;
  }
  .ex-top {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 0.5px solid var(--gray-border);
    display: flex; align-items: center; gap: 10px;
  }
  .ex-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--green); color: white;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ex-meta { flex: 1; }
  .ex-type { font-size: 13px; font-weight: 500; color: var(--text); }
  .ex-time { font-size: 12px; color: var(--gray-text); margin-top: 1px; }

  .ex-body { padding: 1rem 1.25rem; }
  .ex-question { font-size: 14px; line-height: 1.75; white-space: pre-line; color: var(--text); }

  /* ── ACTION BUTTONS ── */
  .ex-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn-hint, .btn-method {
    font-size: 12px; padding: 5px 12px; border-radius: 999px;
    border: 1px solid; cursor: pointer; font-weight: 500; transition: all 0.12s;
  }
  .btn-hint {
    background: var(--amber-light); border-color: var(--amber-mid); color: var(--amber-dark);
  }
  .btn-hint:hover { background: #FAC775; }
  .btn-method {
    background: var(--blue-light); border-color: #B5D4F4; color: var(--blue-dark);
  }
  .btn-method:hover { background: #B5D4F4; }
  .btn-solution {
    background: var(--green-light); border-color: var(--green-mid); color: var(--green-deep);
  }
  .btn-solution:hover { background: var(--green-mid); }

  /* ── SOLUTION PANEL ── */
  .panel.solution-panel {
    background: #F4FBF8; border: 1px solid var(--green-mid); color: var(--text);
    padding: 14px 16px;
  }
  .sol-answer {
    font-size: 14px; font-weight: 600; color: var(--green-deep);
    background: var(--green-light); border-radius: var(--radius-sm);
    padding: 10px 12px; margin-bottom: 12px; line-height: 1.6;
    border: 0.5px solid var(--green-mid);
  }
  .sol-way { margin-top: 12px; border-top: 0.5px solid var(--green-mid); padding-top: 10px; }
  .sol-way-label {
    font-size: 12px; font-weight: 700; color: var(--green-dark);
    letter-spacing: 0.4px; margin-bottom: 8px;
  }
  .sol-steps {
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    font-size: 13px; line-height: 1.8; color: var(--text);
    background: white;
    border: 0.5px solid var(--green-mid); border-radius: var(--radius-sm);
    padding: 10px 12px; margin: 0;
    direction: rtl; text-align: right;
  }

  /* ── PANELS (hint / method) ── */
  .panel {
    margin: 0 1.25rem 1rem;
    border-radius: var(--radius-sm);
    font-size: 13px; line-height: 1.7;
    display: none;
  }
  .panel.hint-panel {
    background: var(--amber-light); border: 0.5px solid var(--amber-mid); color: var(--amber-dark);
    padding: 10px 14px;
  }
  .panel.method-panel {
    background: var(--blue-light); border: 0.5px solid #B5D4F4; color: var(--blue-dark);
    padding: 12px 16px;
  }
  .panel.method-panel h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .panel.method-panel ol { padding-right: 18px; }
  .panel.method-panel ol li { margin-bottom: 6px; }
  .panel.method-panel .rule-box {
    background: white; border: 0.5px solid #B5D4F4;
    border-radius: var(--radius-sm); padding: 8px 10px; margin-top: 10px;
    font-size: 13px;
  }

  /* ── ANSWER CHECK ── */
  .answer-check {
    margin: 0.75rem 1.25rem 0;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .answer-input {
    flex: 1; min-width: 120px; padding: 8px 12px;
    border: 1.5px solid var(--gray-border); border-radius: var(--radius-sm);
    font-size: 14px; direction: rtl; text-align: right;
    outline: none; transition: border-color 0.15s;
  }
  .answer-input:focus { border-color: var(--green); }
  .answer-input.correct { border-color: var(--green); background: var(--green-light); }
  .answer-input.wrong   { border-color: #e05c5c;    background: #fef0f0; }
  .btn-check {
    padding: 8px 16px; border-radius: var(--radius-sm);
    background: var(--green); color: white;
    border: none; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: background 0.15s;
  }
  .btn-check:hover { background: var(--green-dark); }
  .check-result {
    width: 100%; font-size: 13px; margin-top: 4px; padding: 6px 10px;
    border-radius: var(--radius-sm); display: none;
  }
  .check-result.correct { background: var(--green-light); color: var(--green-deep); border: 0.5px solid var(--green-mid); }
  .check-result.wrong   { background: #fef0f0; color: #7a1a1a; border: 0.5px solid #f5b8b8; }

  /* ── MOCK EXAM badge ── */
  .badge-day.mock { background: #F0EAFE; color: var(--purple-dark); border-color: #C4B8F8; }
    background: #e0e0e0; color: #aaa; cursor: not-allowed;
  }
  .send-divider {
    border-top: 0.5px solid var(--gray-border);
    padding-top: 1rem; margin-top: 0.5rem;
  }
  .send-label { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .send-sub   { font-size: 13px; color: var(--gray-text); margin-bottom: 12px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 100;
    align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: var(--radius);
    max-width: 480px; width: 100%; max-height: 85vh;
    overflow-y: auto; padding: 1.5rem;
    position: relative;
  }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--blue-dark); }
  .modal-close {
    position: absolute; top: 12px; left: 14px;
    background: none; border: none; font-size: 20px;
    color: var(--gray-text); cursor: pointer; line-height: 1;
  }
  .modal ol { padding-right: 20px; }
  .modal ol li { font-size: 14px; line-height: 1.7; margin-bottom: 6px; color: var(--text); }
  .modal .rule-highlight {
    background: var(--blue-light); border-right: 3px solid var(--blue);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 8px 12px; margin: 10px 0; font-size: 13px; color: var(--blue-dark);
    font-weight: 500;
  }
  .modal .example-box {
    background: var(--green-light); border: 0.5px solid var(--green-mid);
    border-radius: var(--radius-sm); padding: 10px 12px;
    font-size: 13px; color: var(--green-deep); margin-top: 10px; line-height: 1.7;
  }

  @media (max-width: 480px) {
    main { padding: 0.75rem; }
    .ex-question { font-size: 13px; }
    .day-title { font-size: 15px; }
  }
</style>
</head>
<body>

<header>
  <h1>🎯 הכנה למבחן מצטיינים</h1>
  <p>חוף השרון · מתמטיקה · 45 דקות ביום</p>
  <button id="mockBtn" onclick="showMockScreen()" style="margin-top:10px;padding:8px 20px;background:var(--purple);color:white;border:none;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer">📝 מבחנים לדוגמה</button>
</header>

<div class="day-tabs" id="dayTabs"></div>
<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<main id="mainContent"></main>

<!-- MOCK EXAM SCREEN -->
<div id="mockScreen" style="display:none; padding:1rem; max-width:700px; margin:0 auto;">
  <div style="display:flex; align-items:center; gap:10px; margin-bottom:1.25rem;">
    <button onclick="hideMockScreen()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-text)">←</button>
    <div>
      <div style="font-size:18px;font-weight:600">📝 מבחנים לדוגמה</div>
      <div style="font-size:13px;color:var(--gray-text)">כל מבחן כולל את כל הנושאים — 60 דקות</div>
    </div>
  </div>
  <div id="mockGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;"></div>
</div>

<!-- MOCK EXAM VIEW -->
<div id="mockExamView" style="display:none; padding:1rem; max-width:700px; margin:0 auto;">
  <div style="display:flex; align-items:center; gap:10px; margin-bottom:1rem;">
    <button onclick="backToMockScreen()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-text)">←</button>
    <div id="mockExamTitle" style="font-size:17px;font-weight:600"></div>
  </div>
  <div id="mockExamContent"></div>
</div>

<!-- METHOD MODAL -->
<div class="modal-overlay" id="methodModal" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ── METHOD CONTENT ─────────────────────────────────────────────
const methods = {
  percent_basic: {
    title: "שיטה: אחוזים — טבלת ערך משולש",
    html: `
      <div class="rule-highlight">הטבלה תמיד נראית כך — שני עמודות: אחוזים | מספר</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;margin:10px 0;">
        <tr style="background:#E6F1FB">
          <th style="border:1px solid #B5D4F4;padding:6px 10px;text-align:center"></th>
          <th style="border:1px solid #B5D4F4;padding:6px 10px;text-align:center">אחוזים</th>
          <th style="border:1px solid #B5D4F4;padding:6px 10px;text-align:center">מספר</th>
        </tr>
        <tr>
          <td style="border:1px solid #B5D4F4;padding:6px 10px;font-weight:600">חלק</td>
          <td style="border:1px solid #B5D4F4;padding:6px 10px;text-align:center;color:#0C447C">?</td>
          <td style="border:1px solid #B5D4F4;padding:6px 10px;text-align:center">ידוע</td>
        </tr>
        <tr style="background:#F7F6F2">
          <td style="border:1px solid #B5D4F4;padding:6px 10px;font-weight:600">שלם</td>
          <td style="border:1px solid #B5D4F4;padding:6px 10px;text-align:center">100</td>
          <td style="border:1px solid #B5D4F4;padding:6px 10px;text-align:center">ידוע</td>
        </tr>
      </table>
      <ol style="margin-top:10px">
        <li>ממלאים את שלושת הנתונים הידועים בטבלה. ה-? הוא מה שמחפשים.</li>
        <li><strong>כלל החישוב:</strong> כופלים את שני המספרים באלכסון שמכיל את ה-?, ומחלקים במספר השלישי.</li>
      </ol>
      <div class="rule-highlight">? = (שני הנתונים האחרים באלכסון) ÷ המספר שנשאר</div>
      <div class="example-box">
        <strong>סוג א: מה הם 30% מ-200?</strong><br>
        <table style="width:100%;border-collapse:collapse;font-size:12px;margin:6px 0">
          <tr style="background:#E1F5EE"><th style="border:1px solid #9FE1CB;padding:4px 8px"></th><th style="border:1px solid #9FE1CB;padding:4px 8px">אחוזים</th><th style="border:1px solid #9FE1CB;padding:4px 8px">מספר</th></tr>
          <tr><td style="border:1px solid #9FE1CB;padding:4px 8px">חלק</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center;color:#0F6E56;font-weight:700">30</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center;color:#0C447C;font-weight:700">?</td></tr>
          <tr style="background:#F4FBF8"><td style="border:1px solid #9FE1CB;padding:4px 8px">שלם</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">100</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">200</td></tr>
        </table>
        ? = 30 × 200 ÷ 100 = <strong>60</strong><br><br>
        <strong>סוג ב: 60 הם כמה אחוז מ-200?</strong><br>
        <table style="width:100%;border-collapse:collapse;font-size:12px;margin:6px 0">
          <tr style="background:#E1F5EE"><th style="border:1px solid #9FE1CB;padding:4px 8px"></th><th style="border:1px solid #9FE1CB;padding:4px 8px">אחוזים</th><th style="border:1px solid #9FE1CB;padding:4px 8px">מספר</th></tr>
          <tr><td style="border:1px solid #9FE1CB;padding:4px 8px">חלק</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center;color:#0C447C;font-weight:700">?</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center;color:#0F6E56;font-weight:700">60</td></tr>
          <tr style="background:#F4FBF8"><td style="border:1px solid #9FE1CB;padding:4px 8px">שלם</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">100</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">200</td></tr>
        </table>
        ? = 60 × 100 ÷ 200 = <strong>30%</strong><br><br>
        <strong>סוג ג: 60 הם 30% מכמה?</strong><br>
        <table style="width:100%;border-collapse:collapse;font-size:12px;margin:6px 0">
          <tr style="background:#E1F5EE"><th style="border:1px solid #9FE1CB;padding:4px 8px"></th><th style="border:1px solid #9FE1CB;padding:4px 8px">אחוזים</th><th style="border:1px solid #9FE1CB;padding:4px 8px">מספר</th></tr>
          <tr><td style="border:1px solid #9FE1CB;padding:4px 8px">חלק</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">30</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center;color:#0F6E56;font-weight:700">60</td></tr>
          <tr style="background:#F4FBF8"><td style="border:1px solid #9FE1CB;padding:4px 8px">שלם</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">100</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center;color:#0C447C;font-weight:700">?</td></tr>
        </table>
        ? = 60 × 100 ÷ 30 = <strong>200</strong>
      </div>
    `
  },
  percent_double: {
    title: "שיטה: הנחה כפולה — טבלת ערך משולש",
    html: `
      <ol>
        <li>כל הנחה היא תרגיל נפרד — פותרים בטבלה <strong>שלב אחרי שלב</strong>.</li>
        <li>התוצאה של הטבלה הראשונה נהיית ה"שלם" בטבלה השנייה.</li>
        <li>לעולם אל תחברי אחוזים ישירות (15%+15% ≠ 30%).</li>
      </ol>
      <div class="example-box">
        <strong>400 ש"ח, הנחה של 15%, ואחר כך עוד 15%:</strong><br><br>
        <strong>טבלה 1 — הנחה ראשונה (מה נשאר אחרי 15% הנחה?):</strong><br>
        <em>אחרי הנחה נשאר 85% מהמחיר</em><br>
        <table style="width:100%;border-collapse:collapse;font-size:12px;margin:6px 0">
          <tr style="background:#E1F5EE"><th style="border:1px solid #9FE1CB;padding:4px 8px"></th><th style="border:1px solid #9FE1CB;padding:4px 8px">אחוזים</th><th style="border:1px solid #9FE1CB;padding:4px 8px">מספר</th></tr>
          <tr><td style="border:1px solid #9FE1CB;padding:4px 8px">חלק</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">85</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center;color:#0C447C;font-weight:700">?</td></tr>
          <tr style="background:#F4FBF8"><td style="border:1px solid #9FE1CB;padding:4px 8px">שלם</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">100</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">400</td></tr>
        </table>
        ? = 85 × 400 ÷ 100 = <strong>340 ש"ח</strong><br><br>
        <strong>טבלה 2 — הנחה שנייה (על 340, לא על 400!):</strong><br>
        <table style="width:100%;border-collapse:collapse;font-size:12px;margin:6px 0">
          <tr style="background:#E1F5EE"><th style="border:1px solid #9FE1CB;padding:4px 8px"></th><th style="border:1px solid #9FE1CB;padding:4px 8px">אחוזים</th><th style="border:1px solid #9FE1CB;padding:4px 8px">מספר</th></tr>
          <tr><td style="border:1px solid #9FE1CB;padding:4px 8px">חלק</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">85</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center;color:#0C447C;font-weight:700">?</td></tr>
          <tr style="background:#F4FBF8"><td style="border:1px solid #9FE1CB;padding:4px 8px">שלם</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">100</td><td style="border:1px solid #9FE1CB;padding:4px 8px;text-align:center">340</td></tr>

function toggle(id) {
  const el = document.getElementById(id);

function openMethod(key) {

  document.getElementById('modalTitle').textContent = m.title;
  document.getElementById('modalBody').innerHTML = m.html;
  document.getElementById('methodModal').classList.add('open');
}

function closeModal(e) {
  if (e.target.id==='methodModal') closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('methodModal').classList.remove('open');

function checkAllMock() {
  const d = days[4];
  let correct = 0;
  d.exercises.forEach((ex, ei) => {
    if (!ex.answer_key) return;
    const input = document.getElementById(`ans_4_${ei}`);
    const result = document.getElementById(`res_4_${ei}`);
    if (!input) return;
    const keyNums = ex.answer_key.replace(/[^\d.]/g,' ').trim().split(/\s+/);
    const userNums = input.value.replace(/[^\d.]/g,' ').trim().split(/\s+/);
    const isOk = keyNums.every(n => userNums.includes(n));
    input.className = 'answer-input ' + (isOk ? 'correct' : 'wrong');
    result.className = 'check-result ' + (isOk ? 'correct' : 'wrong');
    result.style.display = 'block';
    result.textContent = isOk ? '✅ נכון!' : '❌ לא מדויק';
    if (isOk) correct++;
  });
  const score = document.getElementById('mock-score');
  score.style.display = 'block';
  const total = d.exercises.length;
  score.textContent = `ציון: ${correct} מתוך ${total} נכון${correct === total ? ' 🎉 מושלם!' : correct >= 4 ? ' 👍 כל הכבוד!' : ' — כדאי לעבור שוב על הפתרונות'}`;
}

function checkAnswer(dayIdx, exIdx) {
  const input = document.getElementById(`ans_${dayIdx}_${exIdx}`);
  const result = document.getElementById(`res_${dayIdx}_${exIdx}`);
  const ex = days[dayIdx].exercises[exIdx];
  if (!ex.answer_key || !input) return;
  const keyNums = ex.answer_key.replace(/[^\d.]/g,' ').trim().split(/\s+/);
  const userNums = input.value.replace(/[^\d.]/g,' ').trim().split(/\s+/);
  const isCorrect = keyNums.every(n => userNums.includes(n));
  input.className = 'answer-input ' + (isCorrect ? 'correct' : 'wrong');
  result.className = 'check-result ' + (isCorrect ? 'correct' : 'wrong');
  result.style.display = 'block';
  result.textContent = isCorrect ? '✅ נכון! כל הכבוד!' : '❌ לא מדויק — נסי שוב, או פתחי רמז.';
}

// ── MOCK STATE & LOCALSTORAGE ────────────────────────────────────
let currentMockId = null;
const DONE_KEY = 'mathPrep_doneMocks';

function getDoneMocks() {
  try { return JSON.parse(localStorage.getItem(DONE_KEY) || '{}'); } catch { return {}; }
}
function markMockDone(id) {
  const done = getDoneMocks();
  done[id] = true;
  localStorage.setItem(DONE_KEY, JSON.stringify(done));
}

// ── SCREEN MANAGEMENT ────────────────────────────────────────────
function showMockScreen() {
  document.getElementById('dayTabs').style.display = 'none';
  document.querySelector('.progress-wrap').style.display = 'none';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('mockExamView').style.display = 'none';
  document.getElementById('mockScreen').style.display = 'block';
  renderMockGrid();
}
function hideMockScreen() {
  document.getElementById('mockScreen').style.display = 'none';
  document.getElementById('dayTabs').style.display = 'flex';
  document.querySelector('.progress-wrap').style.display = 'block';
  document.getElementById('mainContent').style.display = 'block';
}
function backToMockScreen() {
  document.getElementById('mockExamView').style.display = 'none';
  document.getElementById('mockScreen').style.display = 'block';
  renderMockGrid();
}

// ── RENDER MOCK GRID ─────────────────────────────────────────────
function renderMockGrid() {
  const done = getDoneMocks();
  document.getElementById('mockGrid').innerHTML = mockExams.map(exam => {
    const isDone = done[exam.id];
    return `<div onclick="openMockExam('${exam.id}')" style="background:${isDone?'#F4FBF8':'white'};border-radius:10px;padding:1.25rem;border:${isDone?'2px solid var(--green)':'0.5px solid var(--gray-border)'};cursor:pointer;transition:box-shadow 0.15s;position:relative" onmouseover="this.style.boxShadow='0 2px 12px rgba(0,0,0,0.1)'" onmouseout="this.style.boxShadow='none'">
      ${isDone?'<div style="position:absolute;top:10px;left:12px;font-size:18px">✅</div>':''}
      <div style="font-size:16px;font-weight:700;margin-bottom:6px;color:${isDone?'var(--green-deep)':'var(--text)'}">${exam.label}</div>
      <div style="font-size:12px;color:var(--gray-text);margin-bottom:10px">${exam.exercises.length} שאלות · 60 דקות</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">${exam.topics.map(t=>`<span style="font-size:11px;padding:2px 8px;border-radius:999px;background:var(--gray-bg);border:0.5px solid var(--gray-border);color:var(--gray-text)">${t}</span>`).join('')}</div>
      <div style="margin-top:10px;font-size:12px;font-weight:500;color:${isDone?'var(--green-deep)':'var(--blue)'}">${isDone?'✔ הושלם':'← לחצי להתחיל'}</div>
    </div>`;
  }).join('');
}

// ── OPEN & RENDER MOCK EXAM ──────────────────────────────────────
function openMockExam(id) {
  currentMockId = id;
  const exam = mockExams.find(e => e.id === id);
  document.getElementById('mockScreen').style.display = 'none';
  document.getElementById('mockExamView').style.display = 'block';
  document.getElementById('mockExamTitle').textContent = `📝 ${exam.label} — מבחן מדומה`;

  const exCards = exam.exercises.map((ex,ei) => `
    <div class="exercise-card">
      <div class="ex-top">
        <div class="ex-num">${ei+1}</div>
        <div class="ex-meta"><div class="ex-type">${ex.type}</div><div class="ex-time">⏱ ${ex.time}</div></div>
      </div>
      <div class="ex-body">
        <div class="ex-question">${ex.question}</div>
        <div class="ex-actions">
          <button class="btn-hint" onclick="toggle('mhint_${id}_${ei}')">💡 רמז</button>
          <button class="btn-method" onclick="openMethod('${ex.method}')">📖 שיטת עבודה</button>
        </div>
      </div>
      <div class="panel hint-panel" id="mhint_${id}_${ei}">${ex.hint}</div>
    </div>`).join('');

  const summary = `<div class="exercise-card" style="margin-top:1rem;"><div style="padding:1.25rem;">
    <div style="font-size:15px;font-weight:600;margin-bottom:4px;">📋 בדיקת תשובות</div>
    <div style="font-size:13px;color:#5F5E5A;margin-bottom:1rem;">כתבי תשובה לכל שאלה ובדקי הכל בבת אחת</div>
    ${exam.exercises.map((ex,ei)=>`
      <div style="margin-bottom:12px;">
        <div style="font-size:13px;font-weight:500;margin-bottom:5px;">שאלה ${ei+1} — ${ex.type}</div>
        <div class="answer-check" style="margin:0">
          <input class="answer-input" id="mans_${id}_${ei}" type="text" placeholder="תשובה לשאלה ${ei+1}..."/>
          <div class="check-result" id="mres_${id}_${ei}"></div>
        </div>
      </div>`).join('')}
    <button class="btn-check" style="width:100%;padding:12px;font-size:15px;margin-top:8px;border-radius:8px" onclick="checkMockExam('${id}')">בדקי את כל התשובות ✓</button>
    <div id="mscore_${id}" style="margin-top:12px;font-size:14px;font-weight:600;text-align:center;display:none;padding:12px;border-radius:8px;background:#E1F5EE;color:#085041;border:0.5px solid #9FE1CB"></div>
  </div></div>`;

  document.getElementById('mockExamContent').innerHTML = exCards + summary;
}

  const exam = mockExams.find(e => e.id === id);
  let correct = 0;
  exam.exercises.forEach((ex,ei) => {
    if (!ex.answer_key) return;
    const input  = document.getElementById(`mans_${id}_${ei}`);
    const result = document.getElementById(`mres_${id}_${ei}`);
    if (!input) return;
    const keyNums  = ex.answer_key.replace(/[^\d.]/g,' ').trim().split(/\s+/);
    const userNums = input.value.replace(/[^\d.]/g,' ').trim().split(/\s+/);
    const isOk = keyNums.every(n => userNums.includes(n));
    input.className  = 'answer-input ' + (isOk?'correct':'wrong');
    result.className = 'check-result '  + (isOk?'correct':'wrong');
    result.style.display = 'block';
    result.textContent = isOk ? '✅ נכון!' : '❌ לא מדויק';
    if (isOk) correct++;
  });
  const score = document.getElementById(`mscore_${id}`);
  score.style.display = 'block';
  const total = exam.exercises.length;
  const pct = Math.round(correct/total*100);
  score.textContent = `ציון: ${correct} מתוך ${total} (${pct}%)${correct===total?' 🎉 מושלם!':correct>=Math.ceil(total*0.7)?' 👍 כל הכבוד!':' — כדאי לחזור על הפתרונות'}`;
  markMockDone(id);
}</script>
</body>
</html>
